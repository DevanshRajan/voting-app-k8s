apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - name: redis
    port: {{ .Values.redis.containerPort }}
    targetPort: {{ .Values.redis.containerPort }}
