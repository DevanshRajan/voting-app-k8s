apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: db
  ports:
  - name: postgres
    port: {{ .Values.postgres.containerPort }}
    targetPort: {{ .Values.postgres.containerPort }}
