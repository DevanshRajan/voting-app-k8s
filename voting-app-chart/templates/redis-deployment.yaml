apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deploy
  namespace: {{ .Values.namespace }}
  labels:
    app: redis
    {{- include "voting-app.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        {{- include "voting-app.labels" . | nindent 8 }}
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        ports:
        - containerPort: {{ .Values.redis.containerPort }}
          name: redis
